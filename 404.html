<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cashé</title>
  <script>
    // GitHub Pages SPA redirect
    // Saves the full URL to sessionStorage and redirects to / so index.html can restore the route
    sessionStorage.setItem('__spa_redirect', window.location.href);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
